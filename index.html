    <style>
      :root {
        --bg: #ffffff;
        --text: #000000;
        --border: #e0e0e0;
        --surface: #f9f9f9;
        --correct: #27ae60;
        --wrong: #c0392b;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }

      .layout {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        width: 240px;
        border-right: 1px solid var(--border);
        padding: 20px;
        height: 100vh;
        overflow-y: auto;
        position: sticky;
        top: 0;
      }

      .main-content {
        flex: 1;
        padding: 40px;
        max-width: 800px;
        margin: 0 auto;
      }

      .q-map {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }

      .q-dot {
        aspect-ratio: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
        background: var(--bg);
        transition: all 0.2s;
      }

      .q-dot.current {
        border-color: var(--text);
        font-weight: bold;
        background: var(--surface);
        box-shadow: inset 0 0 0 1px var(--text);
      }

      .q-dot.answered-ok {
        background: var(--correct);
        color: white;
        border-color: var(--correct);
      }

      .q-dot.answered-wrong {
        background: var(--wrong);
        color: white;
        border-color: var(--wrong);
      }

      .question-card h2 {
        font-size: 20px;
        margin-bottom: 24px;
        font-weight: 600;
      }

      .q-image {
        width: 100%;
        max-width: 500px;
        height: auto;
        margin-bottom: 24px;
        border-radius: 4px;
        border: 1px solid var(--border);
      }

      .options {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .option {
        padding: 16px;
        border: 1px solid var(--border);
        background: var(--bg);
        text-align: left;
        font-size: 16px;
        cursor: pointer;
        border-radius: 6px;
        transition: all 0.2s;
        display: flex;
        gap: 12px;
        color: var(--text);
      }

      .option:hover:not(:disabled) {
        background: var(--surface);
      }

      .option.correct {
        border: 2px solid var(--correct) !important;
        background: #f0fff4;
        color: var(--correct);
        font-weight: bold;
      }

      .option.wrong {
        border: 2px solid var(--wrong) !important;
        background: #fff5f5;
        color: var(--wrong);
        font-weight: bold;
      }

      .nav-buttons {
        margin-top: 32px;
        display: flex;
        gap: 16px;
        align-items: center;
      }

      .btn {
        padding: 10px 24px;
        border: 1px solid var(--text);
        background: var(--bg);
        cursor: pointer;
        font-weight: 500;
        border-radius: 4px;
      }

      .btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .btn-primary {
        background: var(--text);
        color: var(--bg);
      }

      .results-screen {
        text-align: center;
        padding-top: 60px;
      }

      .results-score {
        font-size: 64px;
        font-weight: 800;
        margin-bottom: 12px;
      }

      @media (max-width: 768px) {
        .layout {
          flex-direction: column;
        }
        .sidebar {
          width: 100%;
          height: auto;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
      }
    </style>

      let state = {
        current: 0,
        answers: {},
      };

      function init() {
        renderMap();
        renderQuestion();
      }

      function renderMap() {
        const container = document.getElementById("qMap");
        container.innerHTML = "";
        QUESTIONS.forEach((q, i) => {
          const dot = document.createElement("div");
          dot.className = "q-dot";
          if (i === state.current) dot.classList.add("current");

          const ans = state.answers[i];
          if (ans !== undefined) {
            dot.classList.add(
              ans === q.correct ? "answered-ok" : "answered-wrong"
            );
          }

          dot.textContent = i + 1;
          dot.onclick = () => {
            state.current = i;
            renderQuestion();
            renderMap();
          };
          container.appendChild(dot);
        });
      }

      function renderQuestion() {
        const container = document.getElementById("mainContent");
        const q = QUESTIONS[state.current];
        const userAns = state.answers[state.current];
        const revealed = userAns !== undefined;

        let html = `
            <div class="question-card">
                <div style="color: #999; margin-bottom: 12px; font-size: 13px;">Вопрос ${
                  state.current + 1
                } / ${QUESTIONS.length}</div>
                <h2>${q.q}</h2>
                ${q.img_file ? `<img src="${q.img_file}" class="q-image">` : ""}
                <div class="options">
        `;

        q.opts.forEach((opt, i) => {
          let cls = "option";
          if (revealed) {
            if (i === q.correct) cls += " correct";
            else if (i === userAns) cls += " wrong";
          }
          html += `<button class="${cls}" ${
            revealed ? "disabled" : ""
          } onclick="handleSelect(${i})">
                <span>${opt}</span>
            </button>`;
        });

        html += `</div></div><div class="nav-buttons">
            <button class="btn" onclick="prev()" ${
              state.current === 0 ? "disabled" : ""
            }>← Назад</button>
            <button class="btn btn-primary" onclick="next()" ${
              state.current === QUESTIONS.length - 1 ? "disabled" : ""
            }>Вперед →</button>
            ${
              Object.keys(state.answers).length >= QUESTIONS.length - 5
                ? '<button class="btn" onclick="showResults()" style="margin-left: auto;">Завершить</button>'
                : ""
            }
        </div>`;

        container.innerHTML = html;
      }

      function handleSelect(i) {
        if (state.answers[state.current] !== undefined) return;
        state.answers[state.current] = i;
        renderQuestion();
        renderMap();
      }

      function next() {
        if (state.current < QUESTIONS.length - 1) {
          state.current++;
          renderQuestion();
          renderMap();
        }
      }
      function prev() {
        if (state.current > 0) {
          state.current--;
          renderQuestion();
          renderMap();
        }
      }

      function showResults() {
        const correct = QUESTIONS.filter(
          (q, i) => state.answers[i] === q.correct
        ).length;
        const total = QUESTIONS.length;
        const percent = Math.round((correct / total) * 100);

        document.getElementById("mainContent").innerHTML = `
            <div class="results-screen">
                <div class="results-score">${percent}%</div>
                <p style="font-size: 18px; color: #666;">Верных ответов: <strong>${correct}</strong> из ${total}</p>
                <button class="btn btn-primary" style="margin-top: 40px; padding: 12px 32px;" onclick="location.reload()">Начать заново</button>
            </div>
        `;
      }

      init();
    </script>
