<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Тест ПДД</title>
    <style>
      :root {
        --bg: #ffffff;
        --text: #000000;
        --border: #e0e0e0;
        --surface: #f9f9f9;
        --correct: #27ae60;
        --wrong: #c0392b;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        -webkit-text-size-adjust: 100%;
      }

      /* ── DESKTOP LAYOUT ── */
      .layout {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        width: 240px;
        border-right: 1px solid var(--border);
        padding: 20px;
        height: 100vh;
        overflow-y: auto;
        position: sticky;
        top: 0;
        flex-shrink: 0;
      }

      .sidebar-title {
        font-weight: bold;
        margin-bottom: 16px;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .main-content {
        flex: 1;
        padding: 40px;
        max-width: 800px;
        margin: 0 auto;
        min-width: 0;
      }

      /* ── QUESTION MAP ── */
      .q-map {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
      }

      .q-dot {
        aspect-ratio: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
        background: var(--bg);
        transition: all 0.2s;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      .q-dot.current {
        border-color: var(--text);
        font-weight: bold;
        background: var(--surface);
        box-shadow: inset 0 0 0 1px var(--text);
      }

      .q-dot.answered-ok {
        background: var(--correct);
        color: white;
        border-color: var(--correct);
      }

      .q-dot.answered-wrong {
        background: var(--wrong);
        color: white;
        border-color: var(--wrong);
      }

      /* ── QUESTION CARD ── */
      .q-meta {
        color: #999;
        margin-bottom: 12px;
        font-size: 13px;
      }

      .question-card h2 {
        font-size: 20px;
        margin-bottom: 24px;
        font-weight: 600;
        line-height: 1.4;
      }

      .q-image {
        width: 100%;
        max-width: 500px;
        height: auto;
        margin-bottom: 24px;
        border-radius: 4px;
        border: 1px solid var(--border);
        display: block;
      }

      /* ── OPTIONS ── */
      .options {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .option {
        padding: 16px;
        border: 1px solid var(--border);
        background: var(--bg);
        text-align: left;
        font-size: 16px;
        cursor: pointer;
        border-radius: 6px;
        transition: background 0.15s, border-color 0.15s;
        display: flex;
        gap: 12px;
        color: var(--text);
        width: 100%;
        line-height: 1.4;
        -webkit-tap-highlight-color: transparent;
      }

      .option:hover:not(:disabled) {
        background: var(--surface);
      }

      .option:active:not(:disabled) {
        background: #efefef;
      }

      .option.correct {
        border: 2px solid var(--correct) !important;
        background: #f0fff4;
        color: var(--correct);
        font-weight: bold;
      }

      .option.wrong {
        border: 2px solid var(--wrong) !important;
        background: #fff5f5;
        color: var(--wrong);
        font-weight: bold;
      }

      /* ── NAV BUTTONS ── */
      .nav-buttons {
        margin-top: 32px;
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      .btn {
        padding: 12px 24px;
        border: 1px solid var(--text);
        background: var(--bg);
        cursor: pointer;
        font-weight: 500;
        border-radius: 4px;
        font-size: 15px;
        white-space: nowrap;
        -webkit-tap-highlight-color: transparent;
      }

      .btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .btn-primary {
        background: var(--text);
        color: var(--bg);
      }

      .btn-finish {
        margin-left: auto;
      }

      /* ── RESULTS ── */
      .results-screen {
        text-align: center;
        padding-top: 60px;
      }

      .results-score {
        font-size: 64px;
        font-weight: 800;
        margin-bottom: 12px;
      }

      /* ── MOBILE PANEL TOGGLE ── */
      .map-toggle {
        display: none;
      }

      /* ══════════════════════════════
         MOBILE  ≤ 768px
      ══════════════════════════════ */
      @media (max-width: 768px) {

        /* Sidebar becomes a collapsible panel at the top */
        .layout {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;
          height: auto;
          position: static;
          border-right: none;
          border-bottom: 1px solid var(--border);
          padding: 12px 16px;
          overflow: visible;
        }

        .sidebar-title {
          display: none; /* hidden; toggle button replaces it */
        }

        /* Toggle button shown only on mobile */
        .map-toggle {
          display: flex;
          align-items: center;
          justify-content: space-between;
          width: 100%;
          background: none;
          border: none;
          cursor: pointer;
          font-weight: bold;
          font-size: 14px;
          text-transform: uppercase;
          letter-spacing: 1px;
          padding: 4px 0;
          color: var(--text);
        }

        .map-toggle-icon {
          font-size: 18px;
          transition: transform 0.2s;
        }

        .map-collapsed .map-toggle-icon {
          transform: rotate(-90deg);
        }

        #qMapWrapper {
          overflow: hidden;
          transition: max-height 0.3s ease;
          max-height: 600px; /* open by default */
        }

        #qMapWrapper.collapsed {
          max-height: 0;
        }

        .q-map {
          grid-template-columns: repeat(8, 1fr);
          gap: 5px;
          padding-top: 10px;
        }

        .q-dot {
          font-size: 10px;
          border-radius: 3px;
        }

        /* Main content tighter on mobile */
        .main-content {
          padding: 20px 16px 100px; /* bottom padding for thumb nav */
        }

        .question-card h2 {
          font-size: 17px;
          margin-bottom: 18px;
        }

        .q-meta {
          font-size: 12px;
        }

        .option {
          font-size: 15px;
          padding: 14px 12px;
        }

        /* Fixed bottom nav bar on mobile */
        .nav-buttons {
          position: fixed;
          bottom: 0;
          left: 0;
          right: 0;
          margin: 0;
          padding: 10px 16px;
          background: var(--bg);
          border-top: 1px solid var(--border);
          gap: 10px;
          z-index: 100;
        }

        .btn {
          flex: 1;
          text-align: center;
          padding: 12px 8px;
          font-size: 14px;
        }

        .btn-finish {
          margin-left: 0;
          flex: 1;
        }

        .results-screen {
          padding-top: 40px;
        }

        .results-score {
          font-size: 48px;
        }
      }
    </style>
  </head>

      // Restore excluded questions 33 and 57 back into the array at correct positions
      (function restoreExcluded() {
        const q33 = {
          n: 33,
          q: "При каком соотношении между силой тяги и силой сцепления колёс с поверхностью дороги, обеспечивается движение без пробуксовки?",

          correct: 2,
          excluded: true,
        };
        const q57 = {
          n: 57,
          q: "Скорость движения транспортного средства при выполнении поворота зависит от:",
          opts: [
            "От веса транспортного средства.",
            "От величины сцепления колёс с дорогой.",
            "От высоты расположения груза.",
            "От радиуса закругления дороги.",
            "Все выше перечисленное.",
          ],
          correct: 4,
          excluded: true,
        };
        // Insert at correct positions by n number
        const insertByN = (arr, item) => {
          const idx = arr.findIndex(q => q.n > item.n);
          if (idx === -1) arr.push(item);
          else arr.splice(idx, 0, item);
        };
        insertByN(QUESTIONS, q33);
        insertByN(QUESTIONS, q57);
      })();

      let state = {
        current: 0,
        answers: {},
      };

      let mapCollapsed = false;

      function toggleMap() {
        mapCollapsed = !mapCollapsed;
        const wrapper = document.getElementById("qMapWrapper");
        const btn = document.getElementById("mapToggle");
        wrapper.classList.toggle("collapsed", mapCollapsed);
        btn.classList.toggle("map-collapsed", mapCollapsed);
      }

      function init() {
        renderMap();
        renderQuestion();
      }

      function renderMap() {
        const container = document.getElementById("qMap");
        container.innerHTML = "";
        QUESTIONS.forEach((q, i) => {
          const dot = document.createElement("div");
          dot.className = "q-dot";
          if (i === state.current) dot.classList.add("current");

          const ans = state.answers[i];
          if (ans !== undefined) {
            dot.classList.add(
              ans === q.correct ? "answered-ok" : "answered-wrong"
            );
          }

          dot.textContent = q.n; // show original question number
          dot.title = `Вопрос ${q.n}`;
          dot.onclick = () => {
            state.current = i;
            renderQuestion();
            renderMap();
            // On mobile, scroll to top of main content
            if (window.innerWidth <= 768) {
              document.getElementById("mainContent").scrollIntoView({ behavior: "smooth" });
            }
          };
          container.appendChild(dot);
        });
      }

      function renderQuestion() {
        const container = document.getElementById("mainContent");
        const q = QUESTIONS[state.current];
        const userAns = state.answers[state.current];
        const revealed = userAns !== undefined;

        const excludedBadge = q.excluded
          ? `<span style="display:inline-block;margin-left:10px;padding:2px 8px;background:#f0e68c;color:#7a6a00;border-radius:4px;font-size:12px;font-weight:600;vertical-align:middle;">ИСКЛЮЧЁН</span>`
          : "";

        let html = `
          <div class="question-card">
            <div class="q-meta">Вопрос ${q.n} / ${QUESTIONS[QUESTIONS.length-1].n}${excludedBadge}</div>
            <h2>${q.q}</h2>
            ${q.img_file ? `<img src="${q.img_file}" class="q-image" alt="">` : ""}
            <div class="options">
        `;

        q.opts.forEach((opt, i) => {
          let cls = "option";
          if (revealed) {
            if (i === q.correct) cls += " correct";
            else if (i === userAns) cls += " wrong";
          }
          html += `<button class="${cls}" ${revealed ? "disabled" : ""} onclick="handleSelect(${i})">
            <span>${opt}</span>
          </button>`;
        });

        const answeredCount = Object.keys(state.answers).length;
        const canFinish = answeredCount >= QUESTIONS.length - 5;

        html += `</div></div>
          <div class="nav-buttons">
            <button class="btn" onclick="prev()" ${state.current === 0 ? "disabled" : ""}>← Назад</button>
            <button class="btn btn-primary" onclick="next()" ${state.current === QUESTIONS.length - 1 ? "disabled" : ""}>Вперёд →</button>
            ${canFinish ? '<button class="btn btn-finish" onclick="showResults()">Завершить</button>' : ""}
          </div>`;

        container.innerHTML = html;

        // On mobile scroll main content to top after navigation
        if (window.innerWidth <= 768) {
          container.scrollTop = 0;
          window.scrollTo(0, container.offsetTop - 10);
        }
      }

      function handleSelect(i) {
        if (state.answers[state.current] !== undefined) return;
        state.answers[state.current] = i;
        renderQuestion();
        renderMap();
      }

      function next() {
        if (state.current < QUESTIONS.length - 1) {
          state.current++;
          renderQuestion();
          renderMap();
        }
      }

      function prev() {
        if (state.current > 0) {
          state.current--;
          renderQuestion();
          renderMap();
        }
      }

      function showResults() {
        const correct = QUESTIONS.filter(
          (q, i) => state.answers[i] === q.correct
        ).length;
        const total = QUESTIONS.length;
        const percent = Math.round((correct / total) * 100);
        const color = percent >= 80 ? "#27ae60" : percent >= 60 ? "#e67e22" : "#c0392b";

        document.getElementById("mainContent").innerHTML = `
          <div class="results-screen">
            <div class="results-score" style="color:${color}">${percent}%</div>
            <p style="font-size: 18px; color: #666; margin-bottom: 8px;">Верных ответов: <strong>${correct}</strong> из <strong>${total}</strong></p>
            <p style="font-size: 14px; color: #999; margin-bottom: 40px;">включая исключённые из экзамена вопросы</p>
            <button class="btn btn-primary" style="padding: 14px 32px; font-size: 16px;" onclick="location.reload()">Начать заново</button>
          </div>
        `;
      }

      init();
    </script>
